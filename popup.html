<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MHTML Opener</title>
    <style>
        body {
            margin: 0;
            padding: 12px;
            min-width: 220px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 13px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #222;
            background: #f6f6f6;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        button:hover { background: #ececec; }
        button:active { background: #dcdcdc; }
        button:last-child { margin-bottom: 0; }
    </style>
</head>
<body>
    <button id="btnPick">选择 MHTML 文件</button>
    <button id="btnNewTab">打开文件选择页</button>
    <button id="btnSave">保存当前页为 MHTML</button>
    <input type="file" id="mhtmlFile" accept=".mhtml,.mht" hidden />
    <script src="mhtml_builder.js"></script>
    <script src="popup.js"></script>
</body>
</html>
